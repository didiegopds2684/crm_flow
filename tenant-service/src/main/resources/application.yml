spring:
  application:
    name: tenant-service
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/crmflow_db}
    username: ${DATABASE_USER:crmflow}
    password: ${DATABASE_PASS:crmflow123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: public
        jdbc:
          time_zone: UTC

  # Flyway auto: roda apenas migrations do schema public na inicialização
  # Migrations do schema tenant/ são aplicadas programaticamente pelo TenantSchemaService
  flyway:
    enabled: true
    locations: classpath:db/migration/public
    schemas: public
    table: flyway_schema_history_tenant
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: 8082

jwt:
  public-key: ${JWT_PUBLIC_KEY:classpath:keys/public.pem}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs
